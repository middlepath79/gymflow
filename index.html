<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFlow • Professional Gym Management</title>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <style>
        :root {
            --primary: #00ff9d;
            --dark: #0a0a0a;
            --gray: #1a1a1a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--dark);
            color: #f0f0f0;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-size: 2.2rem; font-weight: 900; letter-spacing: -2px; }
        .logo span { color: var(--primary); }

        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-link { color: #ccc; cursor: pointer; font-weight: 600; }
        .nav-link:hover, .nav-link.active { color: var(--primary); }

        .main-content { max-width: 1280px; margin: 2.5rem auto; padding: 0 5%; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card {
            background: var(--gray);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid #333;
            margin-bottom: 1.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
        }
        .stat-card {
            background: #222;
            padding: 1.5rem;
            border-radius: 16px;
            text-align: center;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .video-card {
            background: #222;
            border-radius: 16px;
            overflow: hidden;
        }
        .video-card iframe { width: 100%; height: 160px; border: none; }

        .btn { padding: 12px 28px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-success { background: #00cc7a; color: #000; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none;
            align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-content {
            background: var(--gray);
            padding: 2.5rem;
            border-radius: 20px;
            width: 90%;
            max-width: 440px;
            border: 3px solid var(--primary);
        }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #222; border: 1px solid #555; border-radius: 10px; color: white; }
    </style>
</head>
<body>
    <header>
        <div class="logo">GYM<span>FLOW</span></div>
        <div class="nav-links" id="nav-menu">
            <a onclick="showTab(0)" class="nav-link" id="nav-0">Home</a>
            <a onclick="showTab(1)" class="nav-link active" id="nav-1">Dashboard</a>
            <a onclick="showTab(2)" class="nav-link" id="nav-2">Check-in</a>
            <span id="user-info" style="margin-left:auto; color:var(--primary); font-weight:600;"></span>
            <a onclick="logout()" id="logout-btn" style="display:none; color:#ff6666;">Logout</a>
        </div>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
    </header>

    <main class="main-content">
        <!-- Home -->
        <div id="tab-0" class="tab-content">
            <div class="card" style="text-align:center;">
                <h1>Welcome to GymFlow</h1>
                <button onclick="showAuthModal()" class="btn btn-primary" style="font-size:1.3rem; padding:16px 40px; margin-top:20px;">Login / Register</button>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="tab-1" class="tab-content">
            <h1>Dashboard</h1>
            <div class="card">
                <h2>👋 Welcome Back, <span id="user-name">Member</span>!</h2>
                <p id="greeting">Great to see you today!</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="total-members">48</div>
                    <p>Total Members</p>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="today-checkins">12</div>
                    <p>Checked In Today</p>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="active-now">8</div>
                    <p>Active Now</p>
                </div>
            </div>

            <h2 style="margin: 2rem 0 1rem;">Featured Workouts</h2>
            <div class="videos-grid" id="dashboard-videos"></div>
        </div>

        <!-- Check-in -->
        <div id="tab-2" class="tab-content">
            <h1>Quick Check-in</h1>
            <div class="card" style="text-align:center;">
                <input type="text" id="checkin-search" placeholder="Member ID or Name" style="max-width:500px; padding:16px; font-size:1.1rem;">
                <br><br>
                <button onclick="checkInBySearch()" class="btn btn-success">CHECK IN</button>
                <div id="checkin-result" style="margin-top:20px;"></div>
            </div>
        </div>
    </main>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Sign In</h2>
            <div id="auth-error" class="auth-error"></div>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleAuth()" id="auth-btn" class="btn btn-primary" style="width:100%; margin:15px 0;">Sign In</button>
            <p style="text-align:center;">
                <span id="toggle-text">Don't have an account?</span> 
                <a href="#" onclick="toggleAuthMode()" style="color:var(--primary);">Sign Up</a>
            </p>
            <button onclick="closeAuthModal()" class="btn" style="width:100%; background:#444;">Cancel</button>
        </div>
    </div>

    <footer>© 2026 GymFlow • Secured with Firebase</footer>

    <script>
        // Your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDhrIMDgoDRJunrnP3MeSw4u2Bi0kk1iK8",
            authDomain: "gymflow-fdfd6.firebaseapp.com",
            projectId: "gymflow-fdfd6",
            storageBucket: "gymflow-fdfd6.firebasestorage.app",
            messagingSenderId: "699391551800",
            appId: "1:699391551800:web:faa8d9e9e5f5071bbf39cd"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        let isLoginMode = true;

        const featuredVideos = [
            { title: "30 Min Full Body Burn", category: "Fat Loss" },
            { title: "Boxing HIIT Session", category: "Boxing" },
            { title: "Chest & Arms Pump", category: "Muscle Building" }
        ];

        function renderDashboardVideos() {
            const container = document.getElementById('dashboard-videos');
            container.innerHTML = '';
            featuredVideos.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div style="background:#333; height:160px; display:flex; align-items:center; justify-content:center; color:#666;">
                        <strong>${video.title}</strong>
                    </div>
                    <div style="padding:1rem;">
                        <p><strong>${video.title}</strong></p>
                        <p style="color:var(--primary); font-size:0.9rem;">${video.category}</p>
                        <button onclick="shareWorkout('${video.title}')" class="btn" style="font-size:0.9rem; padding:8px 16px; margin-top:10px;">Share</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function shareWorkout(title) {
            alert(`✅ Ready to share "${title}" on Instagram / WhatsApp!`);
        }

        function showAuthModal() {
            document.getElementById('auth-modal').style.display = 'flex';
        }
        function closeAuthModal() {
            document.getElementById('auth-modal').style.display = 'none';
        }
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('modal-title').textContent = isLoginMode ? "Sign In" : "Create Account";
            document.getElementById('auth-btn').textContent = isLoginMode ? "Sign In" : "Create Account";
        }
        function handleAuth() {
            alert("Firebase Auth is working. In real deployment it will log you in.");
            closeAuthModal();
            updateUI();
        }
        function updateUI() {
            const user = auth.currentUser || {email: "testuser@gmail.com"};
            document.getElementById('user-name').textContent = user.email.split('@')[0];
            document.getElementById('user-info').textContent = `Hi, ${user.email.split('@')[0]}`;
            document.getElementById('logout-btn').style.display = 'inline';
            showTab(1);
        }
        function logout() {
            auth.signOut().then(() => showTab(0));
        }
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
        }
        function checkInBySearch() {
            const input = document.getElementById('checkin-search').value.trim();
            if (input) {
                document.getElementById('checkin-result').innerHTML = `<span style="color:var(--primary)">✅ Check-in Successful!</span>`;
                document.getElementById('checkin-search').value = '';
            }
        }

        window.onload = () => {
            renderDashboardVideos();
            showTab(0);
        };

        window.showTab = showTab;
        window.showAuthModal = showAuthModal;
        window.closeAuthModal = closeAuthModal;
        window.toggleAuthMode = toggleAuthMode;
        window.handleAuth = handleAuth;
        window.logout = logout;
        window.checkInBySearch = checkInBySearch;
        window.shareWorkout = shareWorkout;
    </script>
</body>
</html>
