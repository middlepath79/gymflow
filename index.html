<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurposeFlow • Daily Growth</title>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <style>
        :root {
            --primary: #10B981;
            --gold: #D4AF37;
            --navy: #0A2540;
            --dark: #0F172A;
            --card: rgba(30, 41, 55, 0.92);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0A2540 0%, #1E2937 100%);
            color: white;
            min-height: 100vh;
        }
        
        header {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            padding: 1.1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .logo { 
            font-size: 2.3rem; 
            font-weight: 800; 
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo span { color: var(--gold); }
        
        .nav-links {
            display: flex;
            gap: 2.2rem;
            align-items: center;
        }
        
        .nav-link {
            color: #e2e8f0;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .nav-link:hover, .nav-link.active { color: var(--gold); }
        
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            z-index: 1100;
        }
        
        .hamburger span {
            display: block;
            width: 28px;
            height: 3px;
            background: var(--gold);
            border-radius: 3px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        .main-content {
            max-width: 1280px;
            margin: 40px auto;
            padding: 0 5%;
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .card {
            background: var(--card);
            padding: 32px;
            border-radius: 24px;
            margin-top: 24px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .greeting {
            font-size: 2.6rem;
            font-weight: 700;
            line-height: 1.1;
        }
        
        .streak {
            background: #1E2937;
            padding: 12px 24px;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.3rem;
        }
        
        .btn {
            padding: 15px 34px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.05rem;
            transition: all 0.3s ease;
        }
        
        .btn-primary { 
            background: var(--primary); 
            color: #000; 
        }
        
        .btn:hover {
            transform: translateY(-3px);
        }
        
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(8px);
        }
        
        .modal-content {
            background: var(--card);
            padding: 40px;
            border-radius: 28px;
            width: 90%;
            max-width: 460px;
            border: 2px solid var(--gold);
        }
        
        input {
            width: 100%;
            padding: 16px 20px;
            margin: 12px 0;
            background: rgba(15, 23, 42, 0.8);
            color: white;
            border: 1px solid #475569;
            border-radius: 14px;
            font-size: 1.05rem;
        }
        
        footer {
            text-align: center;
            padding: 50px 20px 30px;
            color: #94a3b8;
        }
        
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                position: fixed;
                top: 80px;
                left: 0;
                width: 100%;
                background: rgba(15, 23, 42, 0.98);
                flex-direction: column;
                padding: 30px 5%;
                gap: 20px;
            }
            .nav-links.active { display: flex; }
            .hamburger { display: flex; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">🌊 Purpose<span>FLOW</span></div>
        <div class="nav-links" id="nav-menu">
            <a class="nav-link active" id="nav-0" onclick="showTab(0)">Home</a>
            <a class="nav-link" id="nav-1" onclick="showTab(1)">Dashboard</a>
            <a class="nav-link" id="nav-2" onclick="showTab(2)">Habits</a>
            <span id="user-info" style="margin-left:auto; color:var(--gold);"></span>
            <a id="logout-btn" style="display:none; color:#f87171; cursor:pointer;" onclick="logout()">Logout</a>
        </div>
        <button class="hamburger" id="hamburger-btn">
            <span></span><span></span><span></span>
        </button>
    </header>

    <main class="main-content">
        <!-- Dashboard -->
        <div id="tab-1" class="tab-content active">
            <div class="dashboard-header">
                <div>
                    <p id="time-greeting" style="color:#94a3b8; font-size:1.1rem;"></p>
                    <h1 class="greeting">Good Morning, <span id="user-name">Friend</span>!</h1>
                </div>
                <div class="streak" id="streak-display">🔥 7 Day Streak</div>
            </div>

            <div class="card">
                <h2>Today's Affirmation</h2>
                <p id="affirmation-text" class="affirmation" style="font-size:1.75rem; font-style:italic; color:var(--gold); margin:20px 0;"></p>
                <div style="display:flex; gap:14px;">
                    <button class="btn btn-primary" onclick="speakAffirmation()" style="flex:1;">🔊 Listen</button>
                    <button class="btn" onclick="shareAffirmation()" style="flex:1; background:#334155;">🔗 Share</button>
                </div>
            </div>

            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:24px; margin-top:24px;">
                <div class="card">
                    <h3>🎯 Today's Main Goal</h3>
                    <input type="text" id="main-goal" placeholder="What will move you forward today?" onblur="saveGoal()" style="width:100%; padding:16px;">
                    <button onclick="completeGoal()" class="btn btn-primary" style="width:100%; margin-top:16px;">Mark Progress (+50 XP)</button>
                </div>

                <div class="card">
                    <h3>⚡ Quick Wins</h3>
                    <div style="display:flex; flex-direction:column; gap:12px; margin-top:16px;">
                        <button onclick="quickWin(1)" class="btn" style="background:#1E2937; text-align:left;">Gratitude Journal</button>
                        <button onclick="quickWin(2)" class="btn" style="background:#1E2937; text-align:left;">5 Min Meditation</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Home -->
        <div id="tab-0" class="tab-content">
            <div style="text-align:center; padding:140px 20px;">
                <h1 style="font-size:3.2rem; margin-bottom:20px;">Start Your Day With Purpose</h1>
                <button class="btn btn-primary" onclick="showAuthModal()" style="padding:18px 48px; font-size:1.2rem;">Begin Your Journey</button>
            </div>
        </div>

        <!-- Habits -->
        <div id="tab-2" class="tab-content">
            <h1 style="margin-bottom:24px;">Daily Habits</h1>
            <div class="card">
                <div id="habits-list"></div>
                <button onclick="addHabit()" class="btn" style="width:100%; margin-top:20px; background:#334155;">+ Add New Habit</button>
            </div>
        </div>
    </main>

    <!-- Auth Modal -->
    <div class="modal" id="auth-modal">
        <div class="modal-content">
            <h2 id="modal-title">Sign In</h2>
            <div id="auth-error" style="display:none; background:#451818; color:#ffb0b0; padding:14px; border-radius:10px; margin:12px 0;"></div>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button class="btn btn-primary" style="width:100%; margin-top:12px;" id="auth-btn" onclick="handleAuth()">Sign In</button>
            <p style="margin-top:20px; text-align:center">
                <span id="toggle-text">Don't have an account?</span> 
                <a href="#" onclick="toggleAuthMode()" style="color:var(--gold)">Sign Up</a>
            </p>
            <button onclick="closeAuthModal()" class="btn" style="width:100%; background:#334155; margin-top:12px;">Cancel</button>
        </div>
    </div>

    <footer>© 2026 PurposeFlow • Grow With Purpose Every Day</footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDhrIMDgoDRJunrnP3MeSw4u2Bi0kk1iK8",
            authDomain: "gymflow-fdfd6.firebaseapp.com",
            projectId: "gymflow-fdfd6",
            storageBucket: "gymflow-fdfd6.firebasestorage.app",
            messagingSenderId: "699391551800",
            appId: "1:699391551800:web:faa8d9e9e5f5071bbf39cd"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        let isLoginMode = true;

        let habits = [
            { id: 1, name: "Morning Meditation", completed: true },
            { id: 2, name: "Read 10 Pages", completed: false },
            { id: 3, name: "Gratitude Journal", completed: false }
        ];

        const affirmationsPool = [
            "I am capable of achieving meaningful goals today.",
            "My actions today shape a powerful tomorrow.",
            "I grow stronger through consistent effort and discipline.",
            "I choose growth, peace, and purpose in every moment.",
            "I am becoming the best version of myself."
        ];

        function getDailyAffirmation() {
            const today = new Date().toISOString().split('T')[0];
            let hash = 0;
            for (let i = 0; i < today.length; i++) {
                hash = today.charCodeAt(i) + ((hash << 5) - hash);
            }
            return affirmationsPool[Math.abs(hash) % affirmationsPool.length];
        }

        function getTimeGreeting() {
            const hour = new Date().getHours();
            if (hour < 12) return "Good Morning";
            if (hour < 17) return "Good Afternoon";
            return "Good Evening";
        }

        // Hamburger Menu
        const hamburger = document.getElementById('hamburger-btn');
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            document.getElementById('nav-menu').classList.toggle('active');
        });

        function showAuthModal() { document.getElementById("auth-modal").style.display = "flex"; }
        function closeAuthModal() { document.getElementById("auth-modal").style.display = "none"; }
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById("modal-title").innerText = isLoginMode ? "Sign In" : "Create Account";
            document.getElementById("auth-btn").innerText = isLoginMode ? "Sign In" : "Create Account";
            document.getElementById("toggle-text").innerText = isLoginMode ? "Don't have an account?" : "Already have an account?";
        }

        function handleAuth() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const errorDiv = document.getElementById("auth-error");
            errorDiv.style.display = "none";

            if (!email || !password) {
                errorDiv.style.display = "block";
                errorDiv.innerText = "Please enter email and password";
                return;
            }

            const action = isLoginMode ? 
                auth.signInWithEmailAndPassword(email, password) : 
                auth.createUserWithEmailAndPassword(email, password);

            action.then(() => {
                closeAuthModal();
                updateUI();
            }).catch(err => {
                errorDiv.style.display = "block";
                errorDiv.innerText = err.message;
            });
        }

        function updateUI() {
            const user = auth.currentUser;
            if (user) {
                const name = user.email.split("@")[0];
                document.getElementById("user-name").textContent = name;
                document.getElementById("user-info").innerHTML = `Hi, ${name}`;
                document.getElementById("logout-btn").style.display = "inline";
            }
        }

        function logout() {
            auth.signOut().then(() => {
                document.getElementById("logout-btn").style.display = "none";
                showTab(0);
            });
        }

        function showTab(tab) {
            document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
            document.getElementById("tab-" + tab).classList.add("active");
            document.querySelectorAll(".nav-link").forEach(el => el.classList.remove("active"));
            if (document.getElementById("nav-" + tab)) document.getElementById("nav-" + tab).classList.add("active");
            
            // Close mobile menu
            hamburger.classList.remove('active');
            document.getElementById("nav-menu").classList.remove("active");
        }

        function speakAffirmation() {
            const text = document.getElementById('affirmation-text').textContent;
            speechSynthesis.speak(new SpeechSynthesisUtterance(text));
        }

        async function shareAffirmation() {
            const text = document.getElementById('affirmation-text').textContent;
            try {
                if (navigator.share) await navigator.share({title: "PurposeFlow", text});
                else {
                    await navigator.clipboard.writeText(text);
                    alert("Copied to clipboard!");
                }
            } catch {
                navigator.clipboard.writeText(text);
            }
        }

        function saveGoal() {
            console.log("Goal saved");
        }

        function completeGoal() {
            alert("🎉 Progress recorded! +50 XP");
        }

        function quickWin(n) {
            alert("✅ Quick win logged! +25 XP");
        }

        function loadHabits() {
            const container = document.getElementById('habits-list');
            container.innerHTML = '<h3 style="margin-bottom:16px;">Your Daily Habits</h3>';
            habits.forEach(h => {
                const div = document.createElement('div');
                div.style.cssText = 'padding:18px; margin:12px 0; background:#334155; border-radius:16px; display:flex; justify-content:space-between; align-items:center;';
                div.innerHTML = `<span>${h.name}</span><input type="checkbox" ${h.completed ? 'checked' : ''} onchange="toggleHabit(${h.id})"/>`;
                container.appendChild(div);
            });
        }

        function toggleHabit(id) {
            habits = habits.map(h => h.id === id ? {...h, completed: !h.completed} : h);
            loadHabits();
        }

        function addHabit() {
            const name = prompt("Enter new habit name:");
            if (name) {
                habits.push({ id: Date.now(), name, completed: false });
                loadHabits();
            }
        }

        // Initialize
        auth.onAuthStateChanged(user => {
            if (user) updateUI();
        });

        window.onload = () => {
            showTab(1);
            document.getElementById('affirmation-text').textContent = `"${getDailyAffirmation()}"`;
            document.getElementById('time-greeting').textContent = getTimeGreeting();
            loadHabits();
        };

        // Global functions
        window.showTab = showTab;
        window.showAuthModal = showAuthModal;
        window.closeAuthModal = closeAuthModal;
        window.toggleAuthMode = toggleAuthMode;
        window.handleAuth = handleAuth;
        window.logout = logout;
        window.speakAffirmation = speakAffirmation;
        window.shareAffirmation = shareAffirmation;
        window.saveGoal = saveGoal;
        window.completeGoal = completeGoal;
        window.quickWin = quickWin;
        window.addHabit = addHabit;
        window.toggleHabit = toggleHabit;
    </script>
</body>
</html>
